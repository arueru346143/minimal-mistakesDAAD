# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.

# Theme Settings
#remote_theme             : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "default" 

# Site Settings
locale                   : "zh-TW"
rtl                      : false
title                    : "[Arueru] 的數位花園"
title_separator          : "-"
subtitle                 : "數據、系統與質感的交匯點"
name                     : "Arueru"
description              : "統計背景出身的風險審查員。在這裡記錄短線波段交易系統的開發日常，也分享對日本時裝的熱愛，以及尋找完美 White Negroni 與純肉系拉麵的生活切片。"
url                      : "https://arueru346143.github.io"
baseurl                  : "/minimal-mistakesDAAD"
repository               : "arueru346143/minimal-mistakesDAAD"
teaser                   : 
logo                     : 
masthead_title           : "Arueru's Garden"
breadcrumbs              : true
words_per_minute         : 200
enable_copy_code_button  : true
copyright                : "Arueru"
copyright_url            : 

comments:
  provider               : false

reCaptcha:
  siteKey                :
  secret                 :

atom_feed:
  path                   :
  hide                   : false

search                   : true
search_full_content      : false
search_provider          : lunr

lunr:
  search_within_pages    : false

# SEO Related
google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : 
og_image_alt             : 
social:
  type                   : Person
  name                   : Arueru
  links: 

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "Arueru"
  avatar           : 
  bio              : "風險審查員 / 系統交易者。以統計視角觀察生活，在與兩位室友同住的日常中，總少不了一杯 White Negroni、一碗無海鮮的濃郁拉麵，或是對 AURALEE 與哲學的探索。"
  location         : "Taipei, Taiwan"
  email            :
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/arueru346143"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/arueru346143"
  since: "2024"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs 
  - /test 
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: "Asia/Taipei"

# Pagination
paginate: 5 
paginate_path: /page:num/
pagination:
  enabled: true
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''
  trail:
    before: 2
    after: 2

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
